# Общий конфиг режима компенсации убытков (recovery mode)
# Применяется ко всем ботам одновременно через API сервер

recovery_enabled: True   # включить/выключить режим
recovery_bonus_pct: 0     # бонус сверху к сумме долга в % (0 = без бонуса)
recovery_max_multiplier: 3.0  # максимальный множитель позиции (0 = без ограничения)
